<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书AI收藏助手</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB",sans-serif}
        body{background:#f9f9f9;max-width:380px;margin:30px auto;border-radius:24px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.1)}
        .header{background:#ff2442;color:#fff;padding:18px;text-align:center;font-size:17px;font-weight:600}
        .container{padding:20px;background:#fff}
        .card{background:#fff8f8;border:1px solid #ffe6e6;border-radius:16px;padding:18px;margin-bottom:16px}
        .card-title{font-size:16px;font-weight:700;color:#333;margin-bottom:6px}
        .card-sub{font-size:12px;color:#999;margin-bottom:14px}
        .item{background:#fff;border:1px solid #f2f2f2;border-radius:12px;padding:12px;margin-bottom:10px}
        .text{font-size:14px;line-height:1.5;color:#333;margin-bottom:6px}
        .source{font-size:12px;color:#ff2442;font-weight:500}
        .btn{background:#ff2442;color:#fff;border:none;border-radius:24px;padding:14px;width:100%;font-size:15px;font-weight:600;margin-top:8px}
    </style>
</head>
<body>
    <div class="header">小红书AI收藏助手</div>
    <div class="container">
        <div class="card">
            <div class="card-title">🌆 成都3日游攻略</div>
            <div class="card-sub">AI已归纳3篇收藏笔记</div>
            <div class="item">
                <div class="text">Day1：春熙路 → IFS熊猫 → 锦里古街</div>
                <div class="source">来源：@成都本地小灵通</div>
            </div>
            <div class="item">
                <div class="text">避坑：宽窄巷子别买高价小吃，去建设路</div>
                <div class="source">来源：@旅行踩雷小能手</div>
            </div>
            <div class="item">
                <div class="text">美食：苕皮、锅巴土豆、钵钵鸡必吃</div>
                <div class="source">来源：@吃货小雷达</div>
            </div>
        </div>
        <button class="btn">✅ 生成旅行清单</button>
    </div>
</body>
</html>
